<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voting App</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Quick Poll</h1>
        <p class="question"> Do you Like JavaScript</p>

        <div class="voting-btns">
            <button class="yes-btn" onclick="vote('yes')">Yes</button>
            <button class="no-btn" onclick="vote('No')">No</button>
            <button class="maybe-btn" onclick="vote('Maybe')">Maybe</button>
        </div>


        <div class="result" id="result">
            <h2>Results</h2>
            <p class="no-votes">No votes yet.</p>
        </div>

        <div class="vote-list" id="voteList">
            <h3> Vote History: </h3>
            <div id="voteItems"></div>
        </div>

        <button class="reset-btn" onclick="resetVotes()">Reset Votes</button>
    </div>
</body>
</html>
